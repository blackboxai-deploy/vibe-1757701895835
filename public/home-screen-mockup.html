<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unikart Home Screen Mockup</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #fff; color: #333; }
    .topbar { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    .search-bar { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 20px; }
    .categories { display: flex; justify-content: space-between; margin-bottom: 30px; }
    .category-tile { background: #e1effe; padding: 15px; border-radius: 10px; width: 100px; text-align: center; cursor: pointer; user-select: none; }
    .banner { background: #cce5ff; border-radius: 10px; height: 150px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #007aff; margin-bottom: 30px; }
    .popular-shops-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
    .popular-shops-list { display: flex; overflow-x: auto; gap: 15px; }
    .shop-card { background: #f0f0f0; padding: 15px; border-radius: 10px; min-width: 180px; flex-shrink: 0; }
    .shop-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
    .shop-info { font-size: 14px; margin-bottom: 3px; }
    .floating-cart { position: fixed; bottom: 30px; right: 30px; background: #007aff; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; cursor: pointer; user-select: none; box-shadow: 0 4px 8px rgb(0 122 255 / 0.4); }
  </style>
</head>
<body>

  <div class="topbar">University Name</div>
  <input type="text" class="search-bar" placeholder="Search for products or shops" />

  <div class="categories">
    <div class="category-tile">Food</div>
    <div class="category-tile">Clothes</div>
    <div class="category-tile">Electronics</div>
    <div class="category-tile">Daily Items</div>
    <div class="category-tile">Home Items</div>
  </div>

  <div class="banner">Promotions Carousel</div>

  <div>
    <div class="popular-shops-title">Popular Shops</div>
    <div class="popular-shops-list">
      <div class="shop-card">
        <div class="shop-name">Joe's Cafe</div>
        <div class="shop-info">Rating: 4.5</div>
        <div class="shop-info">Delivery: 20-30 mins</div>
      </div>
      <div class="shop-card">
        <div class="shop-name">Jane's Bookstore</div>
        <div class="shop-info">Rating: 4.7</div>
        <div class="shop-info">Delivery: 15-25 mins</div>
      </div>
      <div class="shop-card">
        <div class="shop-name">Techie's Hub</div>
        <div class="shop-info">Rating: 4.2</div>
        <div class="shop-info">Delivery: 30-40 mins</div>
      </div>
    </div>
  </div>

  <div class="floating-cart">Cart</div>

</body>
</html>
